ver = "0.4.1"

[[tests]]
name = "axis.monitor_tests_wal_advanced_axis"
paths = [
  "../../monitor/tests/wal/advanced/axis.prot",
]
expect_dir = "../../monitor/tests/wal/advanced/expects"
expect_name = "axis.monitor.uart_axi.AXIS.expect"
cmd = "TEST='{}'; TEST=${TEST#../../}; cd ../.. && cargo run --manifest-path Cargo.toml --quiet --offline --package protocols-monitor -- --protocol \"$TEST\" --wave monitor/tests/wal/advanced/uart-axi.fst --instances uut_rx:AXIS --sample-posedge uut_rx.clk --show-waveform-time --time-unit ns 2>/dev/null"

