[[tests]]
name = "monitor.monitor_tests_adders_nested_busy_wait"
paths = [
  "../../monitor/tests/adders/nested_busy_wait.prot",
]
expect_dir = "../../monitor/tests/adders/expects"
expect_name = "nested_busy_wait.monitor.Adder.timeout5s.expect"
cmd = "TEST='{}'; TEST=${TEST#../../}; cd ../.. && python3 -c 'import os, signal, subprocess, sys; timeout=float(sys.argv[1]); proc=subprocess.Popen(sys.argv[2:], start_new_session=True); \ntry:\n    sys.exit(proc.wait(timeout=timeout))\nexcept subprocess.TimeoutExpired:\n    os.killpg(proc.pid, signal.SIGTERM)\n    try:\n        proc.wait(timeout=1)\n    except subprocess.TimeoutExpired:\n        os.killpg(proc.pid, signal.SIGKILL)\n    sys.exit(124)\n' 5 cargo run --manifest-path Cargo.toml --quiet --offline --package protocols-monitor -- --protocol \"$TEST\" --wave monitor/tests/adders/nested_busy_wait.fst --instances add_d1:Adder 2>/dev/null"

