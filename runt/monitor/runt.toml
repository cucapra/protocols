[[tests]]
name = "monitor.tests_adders_nested_busy_wait.nested_busy_wait_monitor"
paths = [
  "../../tests/adders/nested_busy_wait.prot",
]
expect_dir = "../../tests/adders/expects"
expect_name = "nested_busy_wait.monitor.expect"
cmd = "cd ../.. && python3 -c 'import os, signal, subprocess, sys\np = subprocess.Popen(sys.argv[2:], start_new_session=True)\ntry:\n    sys.exit(p.wait(timeout=float(sys.argv[1])))\nexcept subprocess.TimeoutExpired:\n    os.killpg(p.pid, signal.SIGKILL)\n    sys.exit(124)\n' 5 target/debug/protocols-monitor --protocol tests/adders/nested_busy_wait.prot --wave tests/adders/nested_busy_wait.fst --instances add_d1:Adder 2>/dev/null"

