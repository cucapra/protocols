ver = "0.4.1"

[[tests]]
name = "alus.tests_alus_alu_d1.alu_d1_interp_alu_d1"
paths = [
  "../../tests/alus/alu_d1.tx",
]
expect_dir = "../../tests/alus/expects"
expect_name = "alu_d1.interp.alu_d1.expect"
cmd = "cd ../.. && cargo run --offline --package protocols-interp -- --color never --transactions tests/alus/alu_d1.tx --verilog tests/alus/alu_d1.v --protocol tests/alus/alu_d1.prot --module alu_d1 2>/dev/null"

