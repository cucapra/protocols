ver = "0.4.1"

[[tests]]
name = "graph_interp.examples_picorv32_unsigned_mul.unsigned_mul_graph_interp"
paths = [
  "../../examples/picorv32/unsigned_mul.tx",
]
expect_dir = "../../examples/picorv32/expects"
expect_name = "unsigned_mul.graph_interp.expect"
cmd = "cd ../.. && python3 -c 'import difflib, json, subprocess, sys\nbase = json.loads(sys.argv[1])\nflag_sets = json.loads(sys.argv[2])\nruns = [\n    (flags, subprocess.run(base + flags, capture_output=True, text=True))\n    for flags in flag_sets\n]\nbase_flags, base_run = runs[0]\nbaseline = (base_run.stdout, base_run.returncode)\nbase_label = '\"'\"' '\"'\"'.join(base_flags) or '\"'\"'<none>'\"'\"'\nfor flags, r in runs[1:]:\n    if (r.stdout, r.returncode) == baseline:\n        continue\n    label = '\"'\"' '\"'\"'.join(flags) or '\"'\"'<none>'\"'\"'\n    sys.stderr.write('\"'\"'differential mismatch: [%s] vs baseline [%s]\\n'\"'\"'\n                     % (label, base_label))\n    if r.returncode != base_run.returncode:\n        sys.stderr.write('\"'\"'  exit: %s vs %s (baseline)\\n'\"'\"'\n                         % (r.returncode, base_run.returncode))\n    diff = difflib.unified_diff(\n        base_run.stdout.splitlines(keepends=True),\n        r.stdout.splitlines(keepends=True),\n        fromfile='\"'\"'baseline [%s]'\"'\"' % base_label,\n        tofile='\"'\"'[%s]'\"'\"' % label,\n    )\n    sys.stderr.writelines(diff)\n    sys.exit(99)\nsys.stdout.write(baseline[0])\nsys.exit(baseline[1])\n' '[\"cargo\", \"run\", \"--offline\", \"--package\", \"graph-interp\", \"--\", \"--transactions\", \"examples/picorv32/unsigned_mul.tx\", \"--verilog\", \"examples/picorv32/picorv32.v\", \"--protocol\", \"examples/picorv32/pcpi_mul.prot\", \"--module\", \"picorv32_pcpi_mul\"]' '[[], [\"--contract-edges\"], [\"--contract-edges\", \"--normalize-assignments\"]]'"

